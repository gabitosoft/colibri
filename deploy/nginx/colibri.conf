# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name colibri.gabitosoft.com;

    if ($host = colibri.gabitosoft.com) {
        return 301 https://$host$request_uri;
    }

    return 404;
}

# HTTPS — main server
server {
    listen 443 ssl;
    listen [::]:443 ssl ipv6only=on;
    server_name colibri.gabitosoft.com;

    # SSL certificates — managed by Certbot (run: certbot --nginx -d colibri.gabitosoft.com)
    ssl_certificate     /etc/letsencrypt/live/colibri.gabitosoft.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/colibri.gabitosoft.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options           "SAMEORIGIN"  always;
    add_header X-Content-Type-Options    "nosniff"     always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # React SPA — static files
    root  /var/www/colibri.gabitosoft.com/web-app/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Static asset caching (Vite hashes filenames on build)
    location ~* \.(?:js|css|woff2?|ico|png|jpg|jpeg|svg|gif|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # NestJS API — proxy to port 3000
    location /api/ {
        proxy_pass         http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;
        proxy_connect_timeout 10s;
    }

    # Block access to hidden files (e.g. .env, .git)
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
